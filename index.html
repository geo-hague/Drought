<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>U.S. Drought Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
    }

    /* ── App shell ──────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Title bar ──────────────────────────────────────────── */
    #title-bar {
      flex: 0 0 auto;
      background: #2c3e50;
      color: #fff;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #title-bar h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    #title-subtitle {
      font-size: 0.78rem;
      opacity: 0.75;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Map ────────────────────────────────────────────────── */
    #map {
      flex: 1 1 auto;
      min-height: 0;
    }

    /* ── Bottom panel ───────────────────────────────────────── */
    /*    flex-wrap means the date picker falls to a new row    */
    /*    automatically when there isn't enough horizontal room  */
    #bottom-panel {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      overflow-y: auto;
      max-height: 50vh;
    }

    /* ── Legend ─────────────────────────────────────────────── */
    #legend {
      flex: 0 0 auto;
      background: white;
      padding: 8px 12px;
      box-shadow: 0 0 5px rgba(0,0,0,0.25);
      border-radius: 5px;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    .legend-item:last-child { margin-bottom: 0; }

    .legend-color-box {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      border: 1px solid #999;
      flex-shrink: 0;
    }

    /* ── Slider container ───────────────────────────────────── */
    #slider-container {
      flex: 1 1 200px;   /* grows to fill; stays left of date picker on wide screens */
      min-width: 0;
      text-align: center;
    }

    .slider-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
    }

    .step-btn {
      background-color: #337ab7;
      color: white;
      border: none;
      border-radius: 6px;
      min-width: 44px;
      min-height: 44px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .step-btn:hover   { background-color: #1a5276; }
    .step-btn:active  { background-color: #154360; }
    .step-btn:disabled { background-color: #ccc; cursor: not-allowed; }

    /* ── Range slider ────────────────────────────────────────── */
    #slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      outline: none;
      direction: rtl;
      cursor: pointer;
      height: 24px;
    }
    #slider::-webkit-slider-runnable-track {
      height: 6px;
      background: #ddd;
      border-radius: 3px;
    }
    #slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      margin-top: -9px;
      background: #337ab7;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 0 3px rgba(0,0,0,0.4);
    }
    #slider::-moz-range-track {
      height: 6px;
      background: #ddd;
      border-radius: 3px;
    }
    #slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: #337ab7;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 0 3px rgba(0,0,0,0.4);
    }

    #date-display {
      font-size: 1rem;
      color: #1a5276;
      margin-top: 2px;
    }
    #date-range {
      font-size: 0.8rem;
      color: #666;
      margin-top: 2px;
    }
    #slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #555;
      margin-top: 3px;
    }

    /* ── Date picker — third column, wraps below when needed ── */
    #right-placeholder {
      flex: 0 0 auto;          /* don't grow or shrink; wrap to next row instead */
      display: flex;
      flex-direction: column;
      font-size: 13px;
      color: #2c3e50;
      gap: 6px;
    }

    #right-placeholder label {
      font-weight: bold;
      margin: 0;
    }

    #right-placeholder select {
      width: 100%;
      padding: 6px 8px;
      font-size: 0.95rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      min-height: 36px;
    }

    /* ── Opacity control (map overlay widget) ───────────────── */
    .opacity-control-container {
      background: rgba(255, 255, 255, 0.3);
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
      border: 2px solid rgba(0,0,0,0.2);
      width: 100px;
      backdrop-filter: blur(5px);
    }

    .opacity-control-container label {
      display: block;
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 5px;
      color: #333;
    }

    #opacity-slider { width: 100%; cursor: pointer; }

    /* ── Mobile (≤ 600 px) ──────────────────────────────────── */
    @media (max-width: 600px) {
      #title-bar h1   { font-size: 0.9rem; }
      #title-subtitle { display: none; }

      #bottom-panel {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 10px 12px;
        max-height: 55vh;
      }

      /* Compact horizontal legend */
      #legend {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 12px;
        padding: 8px;
        font-size: 12px;
        box-shadow: none;
        border: 1px solid #ddd;
      }
      .legend-item { margin-bottom: 0; }

      #slider-container { width: 100%; }

      #right-placeholder { width: 100%; }

      #date-range { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div id="app">

    <div id="title-bar">
      <h1>U.S. Drought Monitor</h1>
      <span id="title-subtitle">Weekly data from the National Drought Mitigation Center</span>
    </div>

    <div id="map"></div>

    <div id="bottom-panel">
      <div id="legend"></div>

      <div id="slider-container">
        <div class="slider-controls">
          <button id="prev-week" class="step-btn" title="Previous Week">◀</button>
          <input type="range" id="slider" min="0" max="0" value="0" />
          <button id="next-week" class="step-btn" title="Next Week">▶</button>
        </div>
        <div id="date-display"></div>
        <div id="date-range"></div>
        <div id="slider-labels">
          <span id="slider-label-left"></span>
          <span id="slider-label-right"></span>
        </div>
      </div>

      <div id="right-placeholder"></div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="main.js"></script>
</body>
</html>
